name: CI Pipeline for EntryTracker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest  # חשוב שיהיה מותקן pytest להרצת הבדיקות

    - name: Run unit tests with pytest
      run: |
        pytest tests/

    - name: Build Docker image
      run: |
        docker build -t entrytracker:latest .

    - name: Run end-to-end tests with Docker Compose
      run: |
        docker-compose up -d
        # כאן תריצי את הבדיקות E2E שלך, לדוגמה עם curl או כל כלי אחר
        # לדוגמה (תתאימי לפי מה שיש לך):
        # sleep 10
        # curl -f http://localhost:5000/ || exit 1
        docker-compose down

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image to Docker Hub
      run: |
        docker tag entrytracker:latest your-dockerhub-username/entrytracker:latest
        docker push your-dockerhub-username/entrytracker:latest
